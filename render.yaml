services:
  # FastAPI backend
  - type: web
    name: urbannomadapi
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: TICKETMASTER_API_KEY
        sync: false
      - key: EVENTBRITE_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./urban_nomad.db
      - key: CORS_ORIGINS
        value: https://urbannomad.onrender.com

  # React PWA (static site)
  - type: web
    name: urbannomad
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    plan: free
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://urbannomadapi.onrender.com/api
