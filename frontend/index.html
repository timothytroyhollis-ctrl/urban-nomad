<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1B2B5E" />

    <!-- Primary meta -->
    <title>Urban Nomad — Live Local, Explore Everywhere</title>
    <meta name="description" content="Discover live events in your city and get AI-powered cultural intelligence for any city on Earth. Find concerts, festivals, and the local playbook wherever you go." />

    <!-- PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Urban Nomad" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- Open Graph (Facebook, LinkedIn, iMessage, WhatsApp, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Urban Nomad" />
    <meta property="og:title" content="Urban Nomad — Live Local, Explore Everywhere" />
    <meta property="og:description" content="Discover live events in your city and get AI-powered cultural intelligence for any city on Earth." />
    <meta property="og:image" content="/icons/icon-512.png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta property="og:image:alt" content="Urban Nomad logo — globe, hikers, and plane" />
    <meta property="og:url" content="https://urbannomad.onrender.com" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Urban Nomad — Live Local, Explore Everywhere" />
    <meta name="twitter:description" content="Discover live events in your city and AI cultural briefings for any city on Earth." />
    <meta name="twitter:image" content="/icons/icon-512.png" />
    <meta name="twitter:image:alt" content="Urban Nomad logo" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
